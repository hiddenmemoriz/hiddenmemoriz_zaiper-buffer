name: Upload to Google Drive

on:
  push:
    branches: [ main ]  # Runs when you push to main
  workflow_dispatch:    # Allows you to run it manually

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Create Service Account File
        run: |
          echo '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > sa.json

      - name: Upload File to GDrive
        env:
          # We configure rclone via environment variables to avoid a config file
          RCLONE_CONFIG_MYDRIVE_TYPE: drive
          RCLONE_CONFIG_MYDRIVE_SCOPE: drive
          RCLONE_CONFIG_MYDRIVE_SERVICE_ACCOUNT_FILE: sa.json
        run: |
          # Usage: rclone copy <src> <remote_name>:<folder_id_or_path>
          rclone copy spotify.png mydrive: --drive-use-trash=false -v
